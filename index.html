<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomic Replay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --bg-raised: #101014;
  --bg-panel: #16161c;
  --bg-hover: #1c1c24;
  --border: #252530;
  --border-subtle: #1c1c26;
  --text: #e8e6e3;
  --text-dim: #8a8894;
  --text-muted: #555464;
  --clerk: #9b8aaa;
  --opus: #e8a44a;
  --sonnet: #5b9bd5;
  --haiku: #6bc490;
  --accent: #c4a0ff;
  --win: #ffd700;
  --for: #6bc490;
  --against: #d4645c;
  --invalid: #8a8894;
  --font-display: 'Fraunces', serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
  zoom: 1.15;
  height: calc(100vh / 1.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 44px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar h1 {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  font-style: italic;
  letter-spacing: -0.02em;
}
.topbar h1 span {
  color: var(--text-muted);
  font-style: normal;
  font-weight: 300;
  font-size: 13px;
}
.tab-bar {
  display: flex; gap: 2px;
  background: var(--bg-raised);
  border-radius: 6px; padding: 2px;
}
.tab-btn {
  font-family: var(--font-mono); font-size: 11px;
  padding: 5px 14px; border-radius: 4px; border: none;
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { color: var(--text-dim); }
.tab-btn.active { background: var(--bg-panel); color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.round-indicator {
  font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
}
.round-indicator strong { color: var(--accent); font-weight: 500; }

/* ── Scoreboard ── */
.scoreboard {
  display: flex; align-items: center;
  padding: 6px 20px; gap: 24px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-raised);
  flex-shrink: 0; height: 36px;
}
.score-chip {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 12px;
}
.score-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.score-chip .name { color: var(--text-dim); }
.score-chip .pts { font-weight: 500; min-width: 20px; }

/* ── Main ── */
.main-area { flex: 1; display: flex; overflow: hidden; }
.tab-content { display: none; flex: 1; }
.tab-content.active { display: flex; }
.replay-layout { display: flex; flex: 1; overflow: hidden; }

/* ── Public Chat ── */
.public-chat {
  width: 320px; min-width: 260px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--bg);
}
.panel-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.public-chat-feed {
  flex: 1; overflow-y: auto;
  padding: 10px; display: flex;
  flex-direction: column; gap: 6px;
}

/* ── Chat Message ── */
.chat-msg {
  border-radius: 5px; padding: 7px 10px;
  border-left: 3px solid var(--border);
  animation: fadeIn 0.2s ease-out;
}
.chat-msg .sender {
  font-weight: 600; font-size: 11px; margin-bottom: 2px;
  display: flex; align-items: center; gap: 5px;
}
.chat-msg .sender .ts {
  font-family: var(--font-mono); font-size: 9px;
  font-weight: 300; color: var(--text-muted);
}
.chat-msg .sender .badge {
  font-family: var(--font-mono); font-size: 9px; font-weight: 400;
  padding: 0px 4px; border-radius: 2px;
  background: var(--bg-panel); color: var(--text-muted);
}
.chat-msg .body {
  font-size: 12px; line-height: 1.5;
  color: var(--text); opacity: 0.9;
}

/* ── Agent Panels ── */
.agent-panels {
  flex: 1; display: flex; overflow: hidden;
}
.agent-col {
  flex: 1; display: flex; flex-direction: column;
  border-right: 1px solid var(--border-subtle);
  min-width: 0;
}
.agent-col:last-child { border-right: none; }
.agent-col-header {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center;
  justify-content: space-between;
  flex-shrink: 0; background: var(--bg-raised);
}
.agent-identity {
  display: flex; align-items: center; gap: 6px;
}
.agent-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.agent-dot.active { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.agent-name-label { font-weight: 600; font-size: 11px; }
.agent-model {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-muted); padding: 1px 4px;
  background: var(--bg); border-radius: 2px;
}
.agent-status {
  font-family: var(--font-mono); font-size: 10px;
}
.agent-col-body {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
}

/* ── Clerk Panel (full-height, header = toggle button) ── */
.clerk-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 260px;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--bg);
  z-index: 50;
  transform: translateX(100%);
  transition: transform 0.25s ease;
}
.clerk-panel.open { transform: translateX(0); }
.topbar, .scoreboard, .main-area, .playback-bar {
  transition: margin-right 0.25s ease;
}
.topbar.clerk-open, .scoreboard.clerk-open,
.main-area.clerk-open, .playback-bar.clerk-open {
  margin-right: 260px;
}
/* Button in topbar — becomes panel header when open */
.clerk-toggle-topbar {
  font-family: var(--font-mono); font-size: 10px;
  padding: 4px 10px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--bg-raised);
  color: var(--clerk); cursor: pointer; transition: all 0.15s;
}
.clerk-toggle-topbar:hover { background: var(--bg-hover); color: var(--text); }
.clerk-toggle-topbar.active { display: none; }
/* Panel header (visible only when open) */
.clerk-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 10px; height: 44px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--bg);
}
.clerk-panel-label {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--clerk); cursor: pointer;
}
.clerk-panel-label .dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--clerk);
}
.clerk-panel-label .model {
  color: var(--text-muted); font-size: 9px;
  padding: 1px 4px; background: var(--bg-raised); border-radius: 2px;
}
.clerk-close {
  font-size: 16px; color: var(--text-muted); cursor: pointer;
  border: none; background: none; padding: 2px 6px;
  line-height: 1; transition: color 0.15s;
}
.clerk-close:hover { color: var(--text); }
.clerk-panel .agent-col-body {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
}

/* ── Agent Events ── */
.evt { border-radius: 4px; padding: 6px 8px; animation: fadeIn 0.2s ease-out; }

.evt-thinking {
  background: #14101c; border: 1px solid #221a30;
}
.evt-thinking-label {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--accent); opacity: 0.6;
  margin-bottom: 3px;
}
.evt-thinking-label::before { content: '◆ '; font-size: 7px; }
.evt-thinking-text {
  font-size: 12px; line-height: 1.45;
  color: var(--text); opacity: 0.85; font-style: italic;
}

.evt-text {
  background: var(--bg-panel);
  font-size: 12px; line-height: 1.45; color: var(--text); opacity: 0.9;
}

.evt-tool {
  font-family: var(--font-mono); font-size: 10px;
  padding: 4px 7px; background: var(--bg-panel);
  border-radius: 3px; color: var(--text-dim);
  display: flex; align-items: flex-start; gap: 5px;
}
.evt-tool .tool-name { color: var(--accent); font-weight: 500; }
.evt-tool .tool-detail { color: var(--text-muted); word-break: break-word; }
.evt-tool.error { border-left: 2px solid var(--against); }
.evt-tool.error .tool-name { color: var(--against); }

.evt-msg-out {
  background: var(--bg-panel); border-left: 2px solid var(--border); padding: 5px 8px;
}
.evt-msg-out.broadcast { border-left-color: var(--text-muted); }
.evt-msg-out.dm { border-left-color: var(--against); }
.evt-msg-in {
  background: var(--bg-panel); border-left: 2px solid var(--border);
  padding: 5px 8px; opacity: 0.7;
}
.evt-msg-in .evt-msg-sender {
  font-size: 10px; font-weight: 600; margin-bottom: 1px;
}
.evt-msg-meta {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-muted); margin-bottom: 2px;
}
.evt-msg-meta .dm-label { color: var(--against); font-weight: 500; }
.evt-msg-text {
  font-size: 12px; line-height: 1.4; color: var(--text); opacity: 0.85;
}

.evt-note {
  background: #111514; border: 1px dashed #1e2e2a; border-radius: 4px;
}
.evt-note-label {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--for); opacity: 0.6; margin-bottom: 3px;
}
.evt-note-text {
  font-family: var(--font-mono); font-size: 10px;
  line-height: 1.4; color: var(--text); opacity: 0.75;
  white-space: pre-wrap; max-height: 100px; overflow-y: auto;
}

.evt-file-edit {
  background: var(--bg-panel); border-left: 2px solid var(--opus);
}
.evt-file-label {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--opus); margin-bottom: 2px;
}
.evt-file-diff {
  font-family: var(--font-mono); font-size: 10px;
  line-height: 1.4; max-height: 80px; overflow-y: auto;
}
.evt-file-diff .added { color: var(--for); }
.evt-file-diff .removed { color: var(--against); opacity: 0.7; }

.evt-idle {
  text-align: center; padding: 12px;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-muted); opacity: 0.4;
}

/* ── Playback Bar ── */
.playback-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0; height: 48px;
}
.pb-controls { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.pb-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-raised); color: var(--text-dim);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 12px; transition: all 0.15s;
}
.pb-btn:hover { background: var(--bg-hover); color: var(--text); }
.pb-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.pb-time {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-dim); flex-shrink: 0; min-width: 50px;
}
.pb-track-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.pb-track {
  height: 6px; background: var(--bg-panel);
  border-radius: 3px; position: relative; cursor: pointer;
}
.pb-progress {
  height: 100%; background: var(--accent); border-radius: 3px;
  width: 0%; position: relative; transition: width 0.1s linear;
}
.pb-progress::after {
  content: ''; position: absolute; right: -4px; top: -2px;
  width: 10px; height: 10px; background: var(--text);
  border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.5);
}
.pb-event-count {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-muted); flex-shrink: 0;
}
.pb-speed {
  font-family: var(--font-mono); font-size: 10px;
  padding: 4px 8px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--bg-raised);
  color: var(--text-dim); cursor: pointer; flex-shrink: 0;
}
.pb-speed:hover { color: var(--text); background: var(--bg-hover); }

/* ── Scores Tab ── */
.scores-layout { flex: 1; padding: 24px 32px; overflow-y: auto; }
.score-chart { width: 100%; height: 300px; margin-bottom: 24px; }

/* ── Rules Tab ── */
.rules-layout {
  flex: 1; padding: 24px 32px; overflow-y: auto; max-width: 800px;
}
.rules-layout h3 {
  font-family: var(--font-display); font-size: 18px;
  font-weight: 500; margin-bottom: 16px; color: var(--text-dim);
}
.rule-block {
  margin-bottom: 12px; padding: 10px 12px;
  background: var(--bg-panel); border-radius: 5px;
  border-left: 3px solid var(--border);
}
.rule-block.new { border-left-color: var(--for); }
.rule-block.amended { border-left-color: var(--opus); }
.rule-num {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent); margin-bottom: 3px;
}
.rule-text { font-size: 13px; line-height: 1.5; color: var(--text); opacity: 0.9; }

/* ── Loading ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  flex: 1; font-family: var(--font-mono); font-size: 14px;
  color: var(--text-muted);
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>Nomic <span id="gameTitle"></span></h1>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('replay')">Replay</button>
      <button class="tab-btn" onclick="switchTab('scores')">Scores</button>
      <button class="tab-btn" onclick="switchTab('rules')">Rules</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="round-indicator" id="roundIndicator"></div>
    <button class="clerk-toggle-topbar" id="clerkToggleBtn" onclick="toggleClerk()">Clerk</button>
  </div>
</div>

<div class="scoreboard" id="scoreboard"></div>

<div class="main-area">
  <!-- Replay Tab -->
  <div class="tab-content active" id="tab-replay">
    <div class="replay-layout">
      <div class="public-chat">
        <div class="panel-header">Public Chat</div>
        <div class="public-chat-feed" id="publicChat"></div>
      </div>
      <div class="agent-panels" id="agentPanels"></div>
    </div>
  </div>

  <!-- Scores Tab -->
  <div class="tab-content" id="tab-scores">
    <div class="scores-layout" id="scoresContent">
      <div class="loading">Loading scores...</div>
    </div>
  </div>

  <!-- Rules Tab -->
  <div class="tab-content" id="tab-rules">
    <div class="rules-layout" id="rulesContent">
      <div class="loading">Loading rules...</div>
    </div>
  </div>
</div>

<div class="clerk-panel" id="clerkPanel">
  <div class="clerk-panel-header">
    <div class="clerk-panel-label" onclick="toggleClerk()">
      <span class="dot"></span>
      Clerk
      <span class="model" id="clerkModel"></span>
    </div>
    <button class="clerk-close" onclick="toggleClerk()" title="Close">&times;</button>
  </div>
  <div class="agent-col-body" id="clerkFeed"></div>
</div>

<div class="playback-bar">
  <div class="pb-controls">
    <button class="pb-btn" title="Previous event" onclick="stepBack()">⏮</button>
    <button class="pb-btn" title="Play/Pause" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="pb-btn" title="Next event" onclick="stepForward()">⏭</button>
  </div>
  <div class="pb-time" id="pbTime">0 / 0</div>
  <div class="pb-track-wrap">
    <div class="pb-track" id="pbTrack" onclick="seekTo(event)">
      <div class="pb-progress" id="pbProgress"></div>
    </div>
  </div>
  <div class="pb-event-count" id="pbEventCount"></div>
  <button class="pb-speed" id="pbSpeed" onclick="cycleSpeed()">1x</button>
</div>

<script>
// ── State ──
let gameData = null;
let visibleEvents = [];   // filtered events for the replay
let currentIdx = -1;      // index into visibleEvents
let isPlaying = false;
let playTimer = null;
let speeds = [0.5, 1, 2, 5, 10, 50];
let speedIdx = 1;

// Per-panel event feeds (DOM element arrays)
let panelFeeds = {};      // agentName → DOM element
let publicChatFeed = null;
let clerkFeed = null;

// Color map
const MODEL_COLORS = {
  opus: 'var(--opus)',
  sonnet: 'var(--sonnet)',
  haiku: 'var(--haiku)',
  clerk: 'var(--clerk)',
};

function agentColor(name) {
  if (!gameData) return 'var(--text-dim)';
  if (name === 'clerk') return 'var(--clerk)';
  const player = gameData.players.find(p => p.name === name);
  if (player) return MODEL_COLORS[player.model] || 'var(--text-dim)';
  return 'var(--text-dim)';
}

function agentModel(name) {
  if (!gameData) return '';
  if (name === 'clerk') return gameData.clerk?.model || '';
  const player = gameData.players.find(p => p.name === name);
  return player?.model || '';
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toUTCString().slice(17, 25); // HH:MM:SS
}

function shortTime(ts) {
  if (!ts) return '';
  return formatTime(ts).slice(0, 5);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMarkdownLight(text) {
  // Minimal markdown: bold, code, newlines
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/`(.+?)`/g, '<code style="background:var(--bg);padding:1px 3px;border-radius:2px;font-size:0.9em">$1</code>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

// ── Load Data ──
async function loadGame(path) {
  const resp = await fetch(path);
  gameData = await resp.json();
  initUI();
}

function initUI() {
  // Title
  document.getElementById('gameTitle').textContent = gameData.meta.game_id.replace('game-', 'Game ');

  // Clerk model
  if (gameData.clerk) {
    document.getElementById('clerkModel').textContent = gameData.clerk.model;
  }

  // Build agent panels
  const agentPanelsEl = document.getElementById('agentPanels');
  agentPanelsEl.innerHTML = '';
  panelFeeds = {};

  for (const player of gameData.players) {
    const col = document.createElement('div');
    col.className = 'agent-col';
    col.innerHTML = `
      <div class="agent-col-header">
        <div class="agent-identity">
          <div class="agent-dot" id="dot-${player.name}" style="background: ${agentColor(player.name)}"></div>
          <span class="agent-name-label" style="color: ${agentColor(player.name)}">${player.name}</span>
          <span class="agent-model">${player.model}</span>
        </div>
        <div class="agent-status" style="color: var(--text-muted)" id="status-${player.name}">idle</div>
      </div>
      <div class="agent-col-body" id="feed-${player.name}"></div>
    `;
    agentPanelsEl.appendChild(col);
    panelFeeds[player.name] = document.getElementById(`feed-${player.name}`);
  }

  publicChatFeed = document.getElementById('publicChat');
  clerkFeed = document.getElementById('clerkFeed');
  panelFeeds['clerk'] = clerkFeed;

  // Filter events for replay (skip noise)
  visibleEvents = gameData.events.filter(e => {
    // Skip low-value bash commands
    if (e.type === 'tool_call' && e.tool === 'bash') {
      const cmd = e.command || '';
      if (cmd.includes('player_cli.py') || cmd.includes('clerk_cli.py')) return true;
      return false;
    }
    // Skip system error messages (context window overflow etc.)
    if (e.type === 'text' && e.content === 'Prompt is too long') return false;
    return true;
  });

  // Scoreboard
  updateScoreboard({});

  // Playback info
  document.getElementById('pbEventCount').textContent = `${visibleEvents.length} events`;
  updatePlaybackUI();
}

// ── Rendering ──
function renderEventToPanel(evt) {
  const feed = panelFeeds[evt.source];
  if (!feed) return;

  let el;

  switch (evt.type) {
    case 'thinking':
      el = document.createElement('div');
      el.className = 'evt evt-thinking';
      el.innerHTML = `
        <div class="evt-thinking-label">${shortTime(evt.timestamp)}</div>
        <div class="evt-thinking-text">${escapeHtml(evt.content)}</div>
      `;
      break;

    case 'text':
      el = document.createElement('div');
      el.className = 'evt evt-text';
      el.innerHTML = renderMarkdownLight(evt.content);
      break;

    case 'message':
      el = document.createElement('div');
      const isBroadcast = evt.is_broadcast;
      const isDM = !isBroadcast && evt.to !== 'team-lead';
      el.className = `evt evt-msg-out ${isBroadcast ? 'broadcast' : 'dm'}`;
      const metaLabel = isDM
        ? `<span class="dm-label">DM</span> → ${evt.to}`
        : (evt.to === 'team-lead' ? '→ clerk' : '→ broadcast');
      el.innerHTML = `
        <div class="evt-msg-meta">${metaLabel} · ${shortTime(evt.timestamp)}</div>
        <div class="evt-msg-text">${renderMarkdownLight(evt.content)}</div>
      `;
      break;

    case 'tool_call':
      el = document.createElement('div');
      const isError = evt.is_error;
      el.className = `evt evt-tool ${isError ? 'error' : ''}`;

      let detail = '';
      if (evt.tool === 'commit') {
        detail = evt.result ? `→ ${evt.result}` : '';
      } else if (evt.tool === 'roll_dice') {
        detail = evt.result || '';
      } else if (evt.tool === 'verify' || evt.tool === 'verify_proposal') {
        detail = evt.result ? evt.result.slice(0, 80) : '';
      } else if (evt.tool === 'write_note' || evt.tool === 'append_note') {
        // Render as a note instead
        el.className = 'evt evt-note';
        const noteContent = evt.content || evt.input?.content || '';
        el.innerHTML = `
          <div class="evt-note-label">${evt.tool === 'append_note' ? '📝 appended' : '📝 wrote'} ${evt.filename || ''} · ${shortTime(evt.timestamp)}</div>
          <div class="evt-note-text">${escapeHtml(noteContent).slice(0, 500)}</div>
        `;
        feed.appendChild(el);
        feed.scrollTop = feed.scrollHeight;
        return;
      } else if (evt.tool === 'propose') {
        detail = 'proposal submitted';
      } else if (evt.tool === 'contact_supervisor') {
        detail = 'notified supervisor';
      } else if (evt.tool === 'agent') {
        detail = evt.input?.description || evt.input?.name || '';
      } else if (evt.tool === 'teamcreate') {
        detail = evt.input?.team_name || '';
      } else if (evt.tool === 'commit_all') {
        const msg = evt.input?.message || evt.result || '';
        detail = msg.slice(0, 80);
      } else if (evt.description) {
        detail = evt.description;
      }

      el.innerHTML = `
        <span class="tool-name">${evt.tool}</span>
        <span class="tool-detail">${escapeHtml(detail)}</span>
      `;
      break;

    case 'file_edit':
      el = document.createElement('div');
      el.className = 'evt evt-file-edit';
      const fname = evt.filename || '';
      let diffHtml = '';
      if (evt.old_string && evt.new_string) {
        // Show a compact diff
        const added = evt.new_string.replace(evt.old_string, '').trim();
        if (added) {
          diffHtml = `<div class="evt-file-diff"><span class="added">+ ${escapeHtml(added).slice(0, 200)}</span></div>`;
        }
      } else if (evt.content) {
        diffHtml = `<div class="evt-file-diff"><span class="added">${escapeHtml(evt.content).slice(0, 200)}</span></div>`;
      }
      el.innerHTML = `
        <div class="evt-file-label">${evt.tool} ${fname} · ${shortTime(evt.timestamp)}</div>
        ${diffHtml}
      `;
      break;

    default:
      return; // Skip unknown types
  }

  if (el) {
    feed.appendChild(el);
    feed.scrollTop = feed.scrollHeight;
  }
}

function renderEventToPublicChat(evt) {
  if (evt.type !== 'message') return;
  if (!evt.is_broadcast) return;

  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.style.borderLeftColor = agentColor(evt.source);

  const model = agentModel(evt.source);
  const badgeHtml = model ? `<span class="badge">${model}</span>` : '';

  el.innerHTML = `
    <div class="sender" style="color: ${agentColor(evt.source)}">
      ${evt.source} ${badgeHtml}
      <span class="ts">${shortTime(evt.timestamp)}</span>
    </div>
    <div class="body">${renderMarkdownLight(evt.content)}</div>
  `;

  publicChatFeed.appendChild(el);
  publicChatFeed.scrollTop = publicChatFeed.scrollHeight;
}

function renderIncomingMessage(evt) {
  if (evt.type !== 'message') return;

  // Determine recipients
  let recipients = [];
  if (evt.is_broadcast) {
    // All agents except sender
    recipients = gameData.players.map(p => p.name).filter(n => n !== evt.source);
    if (evt.source !== 'clerk') recipients.push('clerk');
  } else if (evt.to && evt.to !== 'team-lead') {
    // DM to specific agent
    recipients = [evt.to];
  }

  for (const name of recipients) {
    const feed = panelFeeds[name];
    if (!feed) continue;

    const el = document.createElement('div');
    el.className = 'evt evt-msg-in';
    el.style.borderLeftColor = agentColor(evt.source);

    const dmTag = !evt.is_broadcast ? ' <span class="dm-label">DM</span>' : '';
    const preview = evt.content.length > 150 ? evt.content.slice(0, 150) + '...' : evt.content;

    el.innerHTML = `
      <div class="evt-msg-sender" style="color: ${agentColor(evt.source)}">${evt.source}${dmTag} <span class="ts">${shortTime(evt.timestamp)}</span></div>
      <div class="evt-msg-text">${renderMarkdownLight(preview)}</div>
    `;
    feed.appendChild(el);
    feed.scrollTop = feed.scrollHeight;
  }
}

function updateAgentStatus(agentName, status) {
  const statusEl = document.getElementById(`status-${agentName}`);
  if (statusEl) {
    statusEl.textContent = status;
    statusEl.style.color = status === 'idle' ? 'var(--text-muted)'
      : status.includes('thinking') ? 'var(--accent)'
      : 'var(--for)';
  }
  // Same for clerk
  if (agentName === 'clerk') {
    const cs = document.getElementById('clerkStatus');
    if (cs) {
      cs.textContent = status;
      cs.style.color = status === 'idle' ? 'var(--text-muted)' : 'var(--for)';
    }
  }

  const dotEl = document.getElementById(`dot-${agentName}`);
  if (dotEl) {
    if (status !== 'idle') {
      dotEl.classList.add('active');
    } else {
      dotEl.classList.remove('active');
    }
  }
}

function updateScoreboard(scores) {
  const sb = document.getElementById('scoreboard');
  if (!gameData) return;

  sb.innerHTML = gameData.players.map(p => {
    const pts = scores[p.name] || 0;
    return `
      <div class="score-chip">
        <div class="dot" style="background: ${agentColor(p.name)}"></div>
        <span class="name">${p.name}</span>
        <span class="pts" style="color: ${agentColor(p.name)}">${pts}</span>
      </div>
    `;
  }).join('');
}

// ── Playback ──
function advanceTo(targetIdx) {
  if (targetIdx < 0 || targetIdx >= visibleEvents.length) return;
  if (targetIdx <= currentIdx) {
    // Rewind: clear all feeds and replay from start
    clearFeeds();
    currentIdx = -1;
  }

  while (currentIdx < targetIdx) {
    currentIdx++;
    const evt = visibleEvents[currentIdx];
    renderEventToPanel(evt);
    renderEventToPublicChat(evt);
    renderIncomingMessage(evt);
  }

  // Update agent statuses based on current event
  if (currentIdx >= 0) {
    const curr = visibleEvents[currentIdx];
    // Set all to idle
    for (const p of gameData.players) {
      updateAgentStatus(p.name, 'idle');
    }
    updateAgentStatus('clerk', 'idle');

    // Set current agent as active
    let statusText = 'active';
    if (curr.type === 'thinking') statusText = 'thinking...';
    else if (curr.type === 'message') statusText = 'messaging';
    else if (curr.type === 'tool_call') statusText = curr.tool;
    else if (curr.type === 'file_edit') statusText = 'editing';
    updateAgentStatus(curr.source, statusText);
  }

  updatePlaybackUI();
}

function stepForward() {
  if (currentIdx < visibleEvents.length - 1) {
    advanceTo(currentIdx + 1);
  }
}

function stepBack() {
  if (currentIdx > 0) {
    advanceTo(currentIdx - 1);
  }
}

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('playBtn').classList.toggle('active', isPlaying);

  if (isPlaying) {
    scheduleNext();
  } else {
    clearTimeout(playTimer);
  }
}

function scheduleNext() {
  if (!isPlaying || currentIdx >= visibleEvents.length - 1) {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('playBtn').classList.remove('active');
    return;
  }

  // Calculate delay based on content length (reading time)
  const next = visibleEvents[currentIdx + 1];
  const content = next.content || '';
  const wordCount = content.split(/\s+/).filter(Boolean).length;

  let delay;
  if (next.type === 'message') {
    delay = Math.max(1000, Math.min(5000, wordCount * 60));
  } else if (next.type === 'thinking') {
    delay = Math.max(500, Math.min(4000, wordCount * 40));
  } else if (next.type === 'text') {
    delay = Math.max(500, Math.min(3000, wordCount * 50));
  } else {
    delay = 400;
  }

  delay /= speeds[speedIdx];

  playTimer = setTimeout(() => {
    stepForward();
    scheduleNext();
  }, delay);
}

function seekTo(e) {
  const track = document.getElementById('pbTrack');
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const targetIdx = Math.floor(pct * visibleEvents.length);
  advanceTo(Math.max(0, Math.min(targetIdx, visibleEvents.length - 1)));
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  document.getElementById('pbSpeed').textContent = speeds[speedIdx] + 'x';
}

function clearFeeds() {
  publicChatFeed.innerHTML = '';
  for (const name of Object.keys(panelFeeds)) {
    panelFeeds[name].innerHTML = '';
  }
}

function updatePlaybackUI() {
  const total = visibleEvents.length;
  const idx = currentIdx + 1;
  document.getElementById('pbTime').textContent = `${idx} / ${total}`;
  document.getElementById('pbProgress').style.width = total > 0 ? `${(idx / total) * 100}%` : '0%';

  if (currentIdx >= 0) {
    const evt = visibleEvents[currentIdx];
    const t = shortTime(evt.timestamp);
    document.getElementById('roundIndicator').innerHTML = `<span style="color: var(--text-muted)">${t} UTC</span>`;
  }
}

function toggleClerk() {
  const panel = document.getElementById('clerkPanel');
  const btn = document.getElementById('clerkToggleBtn');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  document.querySelectorAll('.topbar, .scoreboard, .main-area, .playback-bar')
    .forEach(el => el.classList.toggle('clerk-open', isOpen));
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowRight' || e.key === 'l') { stepForward(); }
  else if (e.key === 'ArrowLeft' || e.key === 'j') { stepBack(); }
  else if (e.key === '+' || e.key === '=') { cycleSpeed(); }
});

// ── Init ──
// Load game data from URL param or default
const params = new URLSearchParams(window.location.search);
const gamePath = params.get('game') || 'data/game-5.json';
loadGame(gamePath);
</script>
